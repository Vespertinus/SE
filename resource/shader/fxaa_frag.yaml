type: FRAGMENT
source:
 - |
        #version 330 core

        in vec2 TexCoord;

        uniform sampler2D LdrTex;
        uniform vec2      TexelSize;

        out vec4 FragColor;

        void main() {
            const vec3  luma_w     = vec3(0.299, 0.587, 0.114);
            const float REDUCE_MIN = 1.0 / 128.0;
            const float REDUCE_MUL = 1.0 / 8.0;
            const float SPAN_MAX   = 8.0;

            vec3 rgbNW = texture(LdrTex, TexCoord + vec2(-1.0, -1.0) * TexelSize).rgb;
            vec3 rgbNE = texture(LdrTex, TexCoord + vec2( 1.0, -1.0) * TexelSize).rgb;
            vec3 rgbSW = texture(LdrTex, TexCoord + vec2(-1.0,  1.0) * TexelSize).rgb;
            vec3 rgbSE = texture(LdrTex, TexCoord + vec2( 1.0,  1.0) * TexelSize).rgb;
            vec3 rgbM  = texture(LdrTex, TexCoord).rgb;

            float lumaNW = dot(rgbNW, luma_w);
            float lumaNE = dot(rgbNE, luma_w);
            float lumaSW = dot(rgbSW, luma_w);
            float lumaSE = dot(rgbSE, luma_w);
            float lumaM  = dot(rgbM,  luma_w);

            float lumaMin = min(lumaM, min(min(lumaNW, lumaNE), min(lumaSW, lumaSE)));
            float lumaMax = max(lumaM, max(max(lumaNW, lumaNE), max(lumaSW, lumaSE)));

            vec2 dir;
            dir.x = -((lumaNW + lumaNE) - (lumaSW + lumaSE));
            dir.y =  ((lumaNW + lumaSW) - (lumaNE + lumaSE));

            float dirReduce = max((lumaNW + lumaNE + lumaSW + lumaSE) * REDUCE_MUL,
                                  REDUCE_MIN);
            float rcpDirMin = 1.0 / (min(abs(dir.x), abs(dir.y)) + dirReduce);
            dir = clamp(dir * rcpDirMin, vec2(-SPAN_MAX), vec2(SPAN_MAX)) * TexelSize;

            vec3 rgbA = 0.5 * (
                texture(LdrTex, TexCoord + dir * (1.0/3.0 - 0.5)).rgb +
                texture(LdrTex, TexCoord + dir * (2.0/3.0 - 0.5)).rgb);
            vec3 rgbB = rgbA * 0.5 + 0.25 * (
                texture(LdrTex, TexCoord + dir * -0.5).rgb +
                texture(LdrTex, TexCoord + dir *  0.5).rgb);

            float lumaB = dot(rgbB, luma_w);
            FragColor = vec4(
                ((lumaB < lumaMin) || (lumaB > lumaMax)) ? rgbA : rgbB,
                1.0);
        }

