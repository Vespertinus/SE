type: VERTEX
source:
 - |
        #version 330 core

        // Vertex inputs
        in vec3 Position;
        in vec3 Normal;
        in vec2 TexCoord0;
        in vec4 Tangent;

        // Engine-provided system uniforms
        uniform mat4 MVPMatrix;   // projection * view * model (clip-space)
        uniform mat4 MVMatrix;    // model matrix (world-space transform)

        out vec3 v_WorldPos;
        out vec3 v_Normal;
        out vec2 v_TexCoord;
        out mat3 v_TBN;

        void main() {
            vec4 worldPos = MVMatrix * vec4(Position, 1.0);
            v_WorldPos = worldPos.xyz;

            mat3 normalMat = mat3(MVMatrix);
            v_Normal = normalize(normalMat * Normal);

            vec3 T = normalize(normalMat * Tangent.xyz);
            vec3 N = v_Normal;
            T = normalize(T - dot(T, N) * N);
            vec3 B = cross(N, T) * Tangent.w;
            v_TBN = mat3(T, B, N);

            v_TexCoord = TexCoord0;
            gl_Position = MVPMatrix * (MVMatrix * vec4(Position, 1.0));
        }
