source:
 - |
        #version 420 core

        // G-buffer outputs
        layout(location = 0) out vec4 gAlbedoRoughness;  // RT0: albedo.rgb + roughness.a
        layout(location = 1) out vec4 gNormalMetallicAO; // RT1: oct-normal.rg + metallic.b + ao.a
        layout(location = 2) out vec3 gEmissive;          // RT2: emissive.rgb

        in vec3 v_WorldPos;
        in vec3 v_Normal;
        in vec2 TexCoord;
        in mat3 v_TBN;

        uniform sampler2D DiffuseTex;    // albedo / base colour
        uniform sampler2D NormalTex;     // tangent-space normal map
        uniform sampler2D SpecularTex;   // roughness (G), metallic (B) — glTF metallicRoughness
        uniform sampler2D EmissiveTex;   // emissive colour map (unit 8)

        // BaseColor (vec4)
        // RGB is the albedo/base color of the material, and A as opacity 
        // For non‑metals, this is the diffuse color; for metals, this is the colored specular reflection.
        //
        // Roughness (float)
        // Controls microsurface smoothness.
        // 0 = perfectly smooth (sharp, mirror‑like highlights), 1 = very rough (broad, blurry highlights and dull reflections).
        // 
        // Metallic (float)
        // Indicates whether the surface is a metal or a dielectric.
        // 0 = non‑metal (plastic, wood, stone, etc.), 1 = metal (iron, gold, copper), and values in between are often used for mixed or dirty metals.
        //
        // AO (float)
        // Ambient Occlusion factor, usually 0–1.
        // 0 = fully occluded (darken indirect/ambient lighting), 1 = fully open (no occlusion).
        //
        // _pad0 (float)
        // Unused padding value to keep the struct aligned correctly in GPU memory (e.g., for std140/std430 uniform buffers).
        // 
        // Emissive (vec3)
        // Color and intensity of light the material emits by itself, independent of scene lighting.
        // Black (0,0,0) means no emission; higher values make the object glow in that color.
        //
        // _pad1 (float)
        // Another padding float for memory alignment; again, no visual effect, just layout/packing convenience.

        layout(std140, binding = 1) uniform Material {
            vec4  BaseColor;
            float Roughness;
            float Metallic;
            float AO;
            float _pad0;
            vec3  Emissive;
            float _pad1;
        };

        // Encode world-space normal to oct representation in [-1, 1]^2
        vec2 EncodeNormal(vec3 n) {
            n /= abs(n.x) + abs(n.y) + abs(n.z);
            if (n.z >= 0.0) {
                return n.xy;
            } else {
                return (1.0 - abs(n.yx)) * sign(n.xy);
            }
        }

        void main() {
            vec3 albedo = texture(DiffuseTex, TexCoord).rgb * BaseColor.rgb;

            vec2 specRM = texture(SpecularTex, TexCoord).gb;
            float rough = specRM.r * Roughness;
            float metal = specRM.g * Metallic;

            vec3 tsNormal = texture(NormalTex, TexCoord).rgb * 2.0 - 1.0;
            vec3 N = normalize(v_TBN * tsNormal);

            vec2 octN = EncodeNormal(N);

            gAlbedoRoughness = vec4(albedo, clamp(rough, 0.04, 1.0));
            gNormalMetallicAO = vec4(octN.x, octN.y, metal, AO);
            gEmissive = texture(EmissiveTex, TexCoord).rgb * Emissive;
        }

