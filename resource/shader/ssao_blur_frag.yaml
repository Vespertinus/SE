type: FRAGMENT
source:
 - |
        #version 330 core

        in vec2 TexCoord;

        uniform sampler2D SSAOTex;
        uniform vec2      TexelSize;

        out float FragColor;

        void main() {
            float result = 0.0;
            for (int x = -2; x <= 1; ++x) {
                for (int y = -2; y <= 1; ++y) {
                    vec2 offset = vec2(float(x), float(y)) * TexelSize;
                    result += texture(SSAOTex, TexCoord + offset).r;
                }
            }
            FragColor = result / 16.0;
        }

