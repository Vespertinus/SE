        #version 330 core

        in vec2 TexCoord;

        uniform sampler2D DiffuseTex;
        uniform vec2 TexelSize;

        out vec4 FragColor;

        void main() {
            vec3 c = vec3(0.0);
            c += texture(DiffuseTex, TexCoord + vec2(-0.5, -0.5) * TexelSize).rgb;
            c += texture(DiffuseTex, TexCoord + vec2( 0.5, -0.5) * TexelSize).rgb;
            c += texture(DiffuseTex, TexCoord + vec2(-0.5,  0.5) * TexelSize).rgb;
            c += texture(DiffuseTex, TexCoord + vec2( 0.5,  0.5) * TexelSize).rgb;
            FragColor = vec4(c * 0.25, 1.0);
        }

