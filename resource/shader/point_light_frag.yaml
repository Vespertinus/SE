type: FRAGMENT
source:
 - |
        #version 330 core

        in vec2 TexCoord_NDC;

        uniform sampler2D DiffuseTex;  // RT0 albedo + roughness
        uniform sampler2D NormalTex;   // RT1 oct-normal.rg + metallic.b
        uniform sampler2D BufferTex;   // depth

        uniform mat4  InvVPMatrix;
        uniform mat4  VPMatrix;
        uniform vec3  CamPos;

        uniform vec3  LightPos;
        uniform float LightRadius;
        uniform vec3  LightColor;
        uniform float LightIntensity;

        out vec4 FragColor;

        const float PI = 3.14159265359;

        vec3 DecodeNormal(vec2 enc) {
            vec3 n = vec3(enc.xy, 1.0 - abs(enc.x) - abs(enc.y));
            if (n.z < 0.0) {
                n.xy = (1.0 - abs(n.yx)) * sign(n.xy);
            }
            return normalize(n);
        }

        float DistributionGGX(vec3 N, vec3 H, float roughness) {
            float a      = roughness * roughness;
            float a2     = a * a;
            float NdotH  = max(dot(N, H), 0.0);
            float NdotH2 = NdotH * NdotH;
            float denom  = NdotH2 * (a2 - 1.0) + 1.0;
            return a2 / max(PI * denom * denom, 0.0001);
        }

        float GeometrySchlickGGX(float NdotV, float roughness) {
            float r = roughness + 1.0;
            float k = (r * r) / 8.0;
            return NdotV / (NdotV * (1.0 - k) + k);
        }

        float GeometrySmith(vec3 N, vec3 V, vec3 L, float roughness) {
            float NdotV = max(dot(N, V), 0.0);
            float NdotL = max(dot(N, L), 0.0);
            return GeometrySchlickGGX(NdotV, roughness) * GeometrySchlickGGX(NdotL, roughness);
        }

        vec3 FresnelSchlick(float cosTheta, vec3 F0) {
            return F0 + (1.0 - F0) * pow(clamp(1.0 - cosTheta, 0.0, 1.0), 5.0);
        }

        vec3 CookTorrance(vec3 N, vec3 V, vec3 L, vec3 albedo, float roughness, float metallic,
                          vec3 F0, vec3 radiance) {
            vec3  H   = normalize(V + L);
            float NDF = DistributionGGX(N, H, roughness);
            float G   = GeometrySmith(N, V, L, roughness);
            vec3  F   = FresnelSchlick(max(dot(H, V), 0.0), F0);

            vec3  spec  = (NDF * G * F) / (4.0 * max(dot(N, V), 0.0) * max(dot(N, L), 0.0) + 0.0001);
            vec3  kD    = (vec3(1.0) - F) * (1.0 - metallic);
            float NdotL = max(dot(N, L), 0.0);
            return (kD * albedo / PI + spec) * radiance * NdotL;
        }

        void main() {
            float depth = texture(BufferTex, TexCoord_NDC).r;

            vec4 clip    = vec4(TexCoord_NDC * 2.0 - 1.0, depth * 2.0 - 1.0, 1.0);
            vec4 world   = InvVPMatrix * clip;
            vec3 fragPos = world.xyz / world.w;

            vec4  albedoR = texture(DiffuseTex, TexCoord_NDC);
            vec4  normalM = texture(NormalTex,  TexCoord_NDC);

            vec3  albedo = albedoR.rgb;
            float rough  = clamp(albedoR.a, 0.04, 1.0);
            vec3  N      = DecodeNormal(normalM.rg);
            float metal  = normalM.b;

            vec3 V  = normalize(CamPos - fragPos);
            vec3 F0 = mix(vec3(0.04), albedo, metal);

            vec3  toLight = LightPos - fragPos;
            float dist    = length(toLight);
            vec3  L       = toLight / max(dist, 0.0001);
            float atten   = clamp(1.0 - dist / LightRadius, 0.0, 1.0);
            atten         = atten * atten;
            vec3 radiance = LightColor * LightIntensity * atten;

            vec3 Lo = CookTorrance(N, V, L, albedo, rough, metal, F0, radiance);

            FragColor = vec4(Lo, 1.0);
        }

